                                                    )}
                                                </div>
                                            ) : f.type === 'textarea' ? (
                                                <textarea className="w-full bg-slate-50 border rounded-xl px-4 py-3 text-sm font-bold min-h-[100px] outline-none" value={formData[f.name]} onChange={e => handleInputChange(f.name, e.target.value)} required={f.required !== false} />
                                            ) : (
                                                <input type={f.type} className="w-full bg-slate-50 border rounded-xl px-4 py-3 text-sm font-black outline-none" value={formData[f.name]} onChange={e => handleInputChange(f.name, e.target.value)} required={f.required !== false} />
                                            )}
                                        </>
                                    )}
                                </div>
                            ))}</div>
                            {hasImage && (<div className="space-y-2"><label className="text-[10px] text-slate-400 font-black pl-2">写真</label><div className="flex gap-2 overflow-x-auto py-2">{images.map((img, i) => (<div key={i} className="relative shrink-0"><img src={img} className="w-16 h-16 object-cover rounded-xl border" /><button type="button" onClick={() => {const ni=[...images]; ni.splice(i,1); setImages(ni);}} className="absolute -top-1 -right-1 bg-rose-500 text-white rounded-full p-1 font-black"><Icon name="X" size={10}/></button></div>))}<button type="button" onClick={() => fileRef.current.click()} className="w-16 h-16 bg-slate-50 border-2 border-dashed rounded-xl flex items-center justify-center text-slate-300"><Icon name="Camera" size={24} /></button></div><input type="file" ref={fileRef} className="hidden" multiple accept="image/*" onChange={async e => { const comp = await Promise.all(Array.from(e.target.files).map(f => compressImage(f))); setImages([...images, ...comp.filter(c => c)]); }} /></div>)}
                            <button type="submit" disabled={isSaving} className="w-full bg-indigo-600 text-white py-5 rounded-[1.5rem] font-black shadow-xl active:scale-95 transition-all">{isSaving ? "送信中..." : "保存する"}</button>
                        </form>
                    </div>
                </div>
            );
        }

        function StockHistoryModal({ item, logs, onClose }) {
            const monthlyStats = useMemo(() => {
                const stats = {};
                logs.forEach(log => {
                    const date = log.timestamp?.seconds ? new Date(log.timestamp.seconds * 1000) : new Date(log.timestamp);
                    const monthKey = `${date.getFullYear()}/${date.getMonth() + 1}`;
                    if (!stats[monthKey]) stats[monthKey] = { used: 0, refill: 0 };
                    if (log.change > 0) stats[monthKey].refill += log.change;
                    if (log.change < 0) stats[monthKey].used += Math.abs(log.change);
                });
                return Object.entries(stats).sort((a, b) => {
                    const [yA, mA] = a[0].split('/').map(Number);
                    const [yB, mB] = b[0].split('/').map(Number);
                    return yB !== yA ? yB - yA : mB - mA;
                });
            }, [logs]);

            return (
                <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[1500] flex items-end sm:items-center justify-center p-4 font-black text-left text-slate-900">
                    <div className="bg-white w-full max-w-lg rounded-[2.5rem] p-6 shadow-2xl overflow-y-auto max-h-[90vh] animate-in slide-in-from-bottom-5">
                        <div className="flex justify-between items-center mb-6">
                            <div><h3 className="text-xl font-black">{item.name}</h3><p className="text-[10px] text-slate-400">拠点: {item.location} / 在庫ログ</p></div>
                            <button onClick={onClose} className="p-2 text-slate-400 bg-slate-50 rounded-full font-black">✕</button>
                        </div>
                        <div className="space-y-8 text-left">
                            <section className="space-y-3">
                                <h4 className="text-xs text-indigo-500 font-black uppercase tracking-widest flex items-center gap-2 px-1"><Icon name="BarChart2" size={14} /> 月別使用レポート</h4>
                                <div className="grid gap-2 text-left">
                                    {monthlyStats.map(([month, data]) => (
                                        <div key={month} className="bg-slate-50 p-4 rounded-2xl flex justify-between items-center border border-slate-100 text-left text-slate-900">
                                            <span className="text-sm font-black text-slate-700">{month}月</span>
                                            <div className="flex gap-4">
                                                <div className="text-right text-left"><span className="text-[8px] text-slate-400 block uppercase">Used</span><span className="text-base font-black text-rose-500">-{data.used}</span></div>
                                                <div className="text-right border-l pl-4 border-slate-200 text-left text-slate-900"><span className="text-[8px] text-slate-400 block uppercase">Refill</span><span className="text-base font-black text-emerald-500">+{data.refill}</span></div>
                                            </div>
                                        </div>
                                    ))}
                                    {monthlyStats.length === 0 && <p className="text-center py-10 text-slate-300 text-xs italic bg-slate-50 rounded-2xl border-dashed border-2">データはありません</p>}
                                </div>
                            </section>
                            <section className="space-y-4 text-left">
                                <h4 className="text-xs text-indigo-500 font-black uppercase tracking-widest flex items-center gap-2 px-1"><Icon name="History" size={14} /> 詳細履歴</h4>
                                <div className="space-y-4 text-left text-slate-900">
                                    {logs.map((log, i) => (
                                        <div key={i} className="flex gap-3 relative text-left">
                                            {i !== logs.length - 1 && <div className="absolute left-[11px] top-6 bottom-[-16px] w-[2px] bg-slate-100"></div>}
                                            <div className={`w-6 h-6 rounded-full flex items-center justify-center shrink-0 z-10 ${log.change > 0 ? 'bg-emerald-100 text-emerald-600' : 'bg-rose-100 text-rose-600'}`}><Icon name={log.change > 0 ? "Plus" : "Minus"} size={12} strokeWidth={4} /></div>
                                            <div className="flex-1 pb-4 text-left">
                                                <div className="flex justify-between items-start text-left"><span className={`text-sm font-black ${log.change > 0 ? 'text-emerald-600' : 'text-rose-600'}`}>{log.change > 0 ? `+${log.change} 補充` : `${log.change} 消費`}</span><span className="text-[10px] text-slate-300 font-black">{formatDateTime(log.timestamp)}</span></div>
                                                <div className="text-[10px] text-slate-400 font-bold mt-0.5 text-left">残数: {log.stockAfter}個</div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </section>
                        </div>
                        <button onClick={onClose} className="w-full mt-6 bg-slate-800 text-white py-4 rounded-2xl font-black active:scale-95 transition-transform shadow-lg">閉じる</button>
                    </div>
                </div>
            );
        }

        function ShiftBulkModal({ date, existingShifts, onClose, onSave }) {
            const [selectedDate, setSelectedDate] = useState(date || new Date().toLocaleDateString('sv-SE'));
            const [taniguchiHoliday, setTaniguchiHoliday] = useState(existingShifts.some(s => s.taniguchiHoliday));
            const [assignments, setAssignments] = useState(() => { const initial = {}; TIME_SLOTS.forEach(slot => { initial[slot] = existingShifts.filter(s => s.timeSlot === slot).map(s => s.staff); }); return initial; });
            const [isSaving, setIsSaving] = useState(false);
            const toggleStaff = (slot, staff) => { setAssignments(prev => { const current = prev[slot] || []; if (current.includes(staff)) return { ...prev, [slot]: current.filter(s => s !== staff) }; else return { ...prev, [slot]: [...current, staff] }; }); };
            const handleSave = async () => { setIsSaving(true); const flatShifts = []; Object.entries(assignments).forEach(([slot, staffs]) => { staffs.forEach(staff => { flatShifts.push({ date: selectedDate, timeSlot: slot, staff: staff, taniguchiHoliday: taniguchiHoliday }); }); }); if (flatShifts.length === 0 && taniguchiHoliday) flatShifts.push({ date: selectedDate, timeSlot: "OFF", staff: "NONE", taniguchiHoliday: true }); await onSave(selectedDate, flatShifts); setIsSaving(false); onClose(); };
            return (
                <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[1500] flex items-end sm:items-center justify-center p-4 font-black">
                    <div className="bg-white w-full max-w-lg rounded-[2.5rem] p-6 shadow-2xl overflow-y-auto max-h-[90vh] animate-in slide-in-from-bottom-5">
                        <div className="flex justify-between items-center mb-6 text-slate-900"><h3 className="text-xl font-black">シフト登録 ({selectedDate.replace(/-/g, '/')})</h3><button onClick={onClose} className="p-2 text-slate-400 font-black">✕</button></div>
                        <div className="space-y-6 text-left">
                            <div className="flex flex-col sm:flex-row gap-4 items-start sm:items-center justify-between text-slate-900">
                                <div className="space-y-1 flex-1 w-full"><label className="text-[10px] text-slate-400 font-black pl-2">対象日</label><input type="date" className="w-full bg-slate-50 border rounded-xl px-4 py-3 text-sm font-black outline-none" value={selectedDate} onChange={e => setSelectedDate(e.target.value)} /></div>
                                <div className="flex items-center gap-3 bg-rose-50 border border-rose-100 px-5 py-3 rounded-2xl cursor-pointer" onClick={() => setTaniguchiHoliday(!taniguchiHoliday)}><input type="checkbox" className="w-5 h-5 accent-rose-600 rounded" checked={taniguchiHoliday} readOnly /><span className="text-sm font-black text-rose-600">谷口休み</span></div>
                            </div>
                            <div className="space-y-4 text-slate-900">{TIME_SLOTS.map(slot => (<div key={slot} className="space-y-2"><div className="flex items-center gap-2"><span className="text-xs font-black text-indigo-600 bg-indigo-50 px-3 py-1 rounded-full">{slot}</span><div className="h-[1px] flex-1 bg-slate-100"></div></div><div className="flex flex-wrap gap-2">{STAFF_LIST.map(staff => (<button key={staff} onClick={() => toggleStaff(slot, staff)} className={`px-3 py-2 rounded-xl text-[11px] font-black transition-all border ${assignments[slot]?.includes(staff) ? 'bg-slate-800 text-white border-slate-800' : 'bg-white text-slate-400 border-slate-100'}`}>{staff}</button>))}</div></div>))}</div>
                            <button onClick={handleSave} disabled={isSaving} className="w-full bg-indigo-600 text-white py-5 rounded-[1.5rem] font-black shadow-xl active:scale-95 transition-all">保存する</button>
                        </div>
                    </div>
                </div>
            );
        }

        // --- Main App Component ---
        function App() {
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('schedule');
            const [selectedFacility, setSelectedFacility] = useState('all');
            const [records, setRecords] = useState([]);
            const [inventoryItems, setInventoryItems] = useState([]);
            const [inventoryLogs, setInventoryLogs] = useState([]);
            const [manuals, setManuals] = useState([]);
            const [bookings, setBookings] = useState([]);
            const [shifts, setShifts] = useState([]);
            
            // 共通状態
            const [isSelectionMode, setIsSelectionMode] = useState(false);
            const [selectedMaintIds, setSelectedMaintIds] = useState(new Set());
            const [toastMessage, setToastMessage] = useState(null);
            
            // ★自動連動のPOP通知用状態
            const [syncNotification, setSyncNotification] = useState(null);

            // モーダル表示状態
            const [showAddMaintenance, setShowAddMaintenance] = useState(false);
            const [editingMaintenanceRecord, setEditingMaintenanceRecord] = useState(null);
            const [showAddUpdate, setShowAddUpdate] = useState(null);
            const [maintenanceSearch, setMaintenanceSearch] = useState('');
            const [maintenanceDateFilter, setMaintenanceDateFilter] = useState(''); 
            const [showAddInventory, setShowAddInventory] = useState(false);
            const [editingInventoryItem, setEditingInventoryItem] = useState(null);
            const [showInventoryHistory, setShowInventoryHistory] = useState(null);
            const [transferGroup, setTransferGroup] = useState(null);
            const [showAddManual, setShowAddManual] = useState(false);
            const [editingManual, setEditingManual] = useState(null);
            const [manualTypeForAdd, setManualTypeForAdd] = useState('manual');
            const [showAddBooking, setShowAddBooking] = useState(false);
            const [editingBooking, setEditingBooking] = useState(null);
            const [selectedDayStr, setSelectedDayStr] = useState(null); 
            const [imageGallery, setImageGallery] = useState(null);
            const [showShiftBulk, setShowShiftBulk] = useState(false);
            const [selectedShiftDate, setSelectedShiftDate] = useState(null);
            const [showArchive, setShowArchive] = useState(false);
            const [showLineReportSelector, setShowLineReportSelector] = useState(false);
            const [selectedReportBookingIds, setSelectedReportBookingIds] = useState(new Set());
            const [showBulkCopyModal, setShowBulkCopyModal] = useState(false);
            const [logoError, setLogoError] = useState(false);

            // ★在庫の自動連動モード（デフォルトON）
            const [inventoryAutoMode, setInventoryAutoMode] = useState(true);

            const { methods, auth, db, appId, initialToken } = window.FirebaseSDK;

            useEffect(() => {
                const init = async () => {
                    if (initialToken) { try { await methods.signInWithCustomToken(auth, initialToken); } catch { await methods.signInAnonymously(auth); } }
                    else { await methods.signInAnonymously(auth); }
                };
                init();
                const unsub = methods.onAuthStateChanged(auth, u => setUser(u));
                return () => unsub();
            }, []);

            useEffect(() => {
                if (!user) return;
                const opts = { error: (e) => console.error(e) };
                const unsubM = methods.onSnapshot(methods.collection(db, 'artifacts', appId, 'public', 'data', 'maintenance_records'), snap => setRecords(snap.docs.map(d => ({ id: d.id, ...d.data() }))), opts.error);
                const unsubI = methods.onSnapshot(methods.collection(db, 'artifacts', appId, 'public', 'data', 'inventory'), snap => setInventoryItems(snap.docs.map(d => ({ id: d.id, ...d.data() }))), opts.error);
                const unsubIL = methods.onSnapshot(methods.collection(db, 'artifacts', appId, 'public', 'data', 'inventory_logs'), snap => setInventoryLogs(snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0))), opts.error);
                const unsubMa = methods.onSnapshot(methods.collection(db, 'artifacts', appId, 'public', 'data', 'manuals'), snap => setManuals(snap.docs.map(d => ({ id: d.id, ...d.data() }))), opts.error);
                const unsubB = methods.onSnapshot(methods.collection(db, 'artifacts', appId, 'public', 'data', 'bookings'), snap => setBookings(snap.docs.map(d => ({ id: d.id, ...d.data() }))), opts.error);
                const unsubS = methods.onSnapshot(methods.collection(db, 'artifacts', appId, 'public', 'data', 'shifts'), snap => {
                    setShifts(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                }, opts.error);
                return () => { unsubM(); unsubI(); unsubIL(); unsubMa(); unsubB(); unsubS(); };
            }, [user]);

            const handleUpdateBooking = async (id, data) => {
                await methods.updateDoc(methods.doc(db, 'artifacts', appId, 'public', 'data', 'bookings', id), { ...data, updatedAt: methods.serverTimestamp() });
            };

            const handleLinkeyCheck = () => {
                const today = new Date();
                const todayStr = today.toLocaleDateString('sv-SE');
                const todayList = bookings.filter(b => todayStr >= b.startDate && todayStr < b.endDate);
                let text = "リンキーチェックです\n今日の宿泊状況\n\n";
                text += `本日（${today.getMonth()+1}/${today.getDate()}）\n`;
                FACILITIES.forEach(facility => {
                    const facilityBookings = todayList.filter(book => book.facility === facility);
                    if (facilityBookings.length > 0) {
                        facilityBookings.forEach(b => {
                            const isCheckIn = b.startDate === todayStr;
                            let statusText = isCheckIn ? `${b.people}名チェックイン` : "宿泊中";
                            text += `${facility}/${statusText}\n`;
                            const extras = [];
                            if (b.luggage) extras.push("荷物預かりあり");
                            if (b.notes) extras.push(`備考：${b.notes}`);
                            if (extras.length > 0) text += `（${extras.join(" ")}）\n`;
                        });
                    } else { text += `${facility}/空室\n`; }
                });
                text += "\n-------";
                copyToClipboard(text, "報告文をコピーしました！");
            };

            const toggleReportSelection = (id) => {
                const next = new Set(selectedReportBookingIds);
                if (next.has(id)) next.delete(id);
                else next.add(id);
                setSelectedReportBookingIds(next);
            };

            const handleBulkLineReport = () => {
                if (selectedReportBookingIds.size === 0) return;
                const now = new Date();
                const todayStr = now.toLocaleDateString('sv-SE');
                const timeStr = `${now.getHours()}時${String(now.getMinutes()).padStart(2, '0')}分`;
                let text = `${timeStr}\n\n`;
                const selectedBookings = bookings.filter(b => selectedReportBookingIds.has(b.id));
                selectedBookings.forEach((b, idx) => {
                    const isOUT = b.endDate === todayStr; const isIN = b.startDate === todayStr; const isSTAY = todayStr > b.startDate && todayStr < b.endDate;
                    const m = b.menCount || 0; const w = b.womenCount || 0; const c = b.childCount || 0; const currentTotal = m + w + c;
                    text += `【${b.facility}】\n`;
                    if (isOUT) { text += `チェックアウトされました\n`; } 
                    else if (currentTotal === 0) { text += `まだチェックインされていません / 予定${b.people}名\n`; }
                    else {
                        const parts = []; if (m > 0) parts.push(`男${m}名`); if (w > 0) parts.push(`女${w}名`); if (c > 0) parts.push(`子供${c}名`);
                        if (parts.length > 0) { text += parts.join('、') + `\n`; }
                        text += `計${currentTotal}名 / 予定${b.people}名\n`;
                        if (isIN) { text += `チェックインしました\n`; } else if (isSTAY) { text += `入室中（滞在）\n`; }
                    }
                    if (idx < selectedBookings.length - 1) text += `\n`;
                });
                copyToClipboard(text, "LINE報告文をコピーしました");
                setShowLineReportSelector(false);
                setSelectedReportBookingIds(new Set());
            };

            const copyToClipboard = (text, message) => {
                const t = document.createElement("textarea"); t.value = text; document.body.appendChild(t); t.select(); document.execCommand('copy'); document.body.removeChild(t);
                setToastMessage(message); setTimeout(() => setToastMessage(null), 3000);
            };

            const handleSave = async (col, data) => { if (!user) return; const t = methods.serverTimestamp(); await methods.addDoc(methods.collection(db, 'artifacts', appId, 'public', 'data', col), { ...data, createdAt: t, updatedAt: t, userId: user.uid }); };
            const handleUpdate = async (col, id, data) => { if (!user) return; await methods.updateDoc(methods.doc(db, 'artifacts', appId, 'public', 'data', col, id), { ...data, updatedAt: methods.serverTimestamp() }); };
            const handleDelete = async (col, id) => { if (!user) return; await methods.deleteDoc(methods.doc(db, 'artifacts', appId, 'public', 'data', col, id)); if(selectedDayStr) setSelectedDayStr(null); };

            // ★在庫の更新 ＋ 自動連動ロジック
            const handleUpdateStock = async (id, v) => {
                const item = inventoryItems.find(i => i.id === id);
                if (!item) return;
                const change = Number(v) - Number(item.stock);
                if (change === 0) return; // 変更なし
                
                const now = new Date().toISOString();
                const logData = { itemId: id, itemName: item.name, location: item.location, change: change, stockAfter: v, timestamp: methods.serverTimestamp(), userId: user.uid };
                
                // 元のアイテムを更新
                await handleUpdate('inventory', id, { prevStock: item.stock, prevChecked: item.lastChecked || item.createdAt?.toDate().toISOString() || now, stock: Math.max(0, v), lastChecked: now });
                await methods.addDoc(methods.collection(db, 'artifacts', appId, 'public', 'data', 'inventory_logs'), logData);

                // ★自動モードON かつ 在庫がプラスされた(補充された)場合のみ連動
                if (inventoryAutoMode && change > 0) {
                    let sourceLocation = '';
                    
                    // 各施設に補充 → エブリィが減る
                    if (['天神', '博多', '清川'].includes(item.location)) {
                        sourceLocation = 'エブリィ';
                    } 
                    // エブリィに補充 → 事務所が減る
                    else if (item.location === 'エブリィ') {
                        sourceLocation = '事務所';
                    }

                    if (sourceLocation) {
                        const sourceItem = inventoryItems.find(i => i.location === sourceLocation && i.name === item.name);
                        if (sourceItem) {
                            const newSourceStock = Math.max(0, Number(sourceItem.stock) - change);
                            await handleUpdate('inventory', sourceItem.id, { prevStock: sourceItem.stock, prevChecked: sourceItem.lastChecked || sourceItem.createdAt?.toDate().toISOString() || now, stock: newSourceStock, lastChecked: now });
                            await methods.addDoc(methods.collection(db, 'artifacts', appId, 'public', 'data', 'inventory_logs'), { itemId: sourceItem.id, itemName: sourceItem.name, location: sourceLocation, change: -change, stockAfter: newSourceStock, timestamp: methods.serverTimestamp(), userId: user.uid });
                            
                            // ★POP通知を表示（控えめで見切れず、どこから何個減ったか分かりやすいデザイン）
                            setSyncNotification({
                                itemName: item.name,
                                sourceLocation: sourceLocation,
                                targetLocation: item.location,
                                amount: change
                            });
                        } else {
                            // 引き落とし元が存在しない場合のエラー通知（トースト）
                            setToastMessage(`「${item.name}」を補充しました。（※${sourceLocation}に同名品がないため自動引き落としはされません）`);
                            setTimeout(() => setToastMessage(null), 4500);
                        }
                    }
                }
            };

            // 移動（振替）ボタン用処理
            const handleTransferStock = async (itemName, fromLoc, toLoc, amount) => {
                if (!user) return;
                const fromItem = inventoryItems.find(i => i.name === itemName && i.location === fromLoc);
                const toItem = inventoryItems.find(i => i.name === itemName && i.location === toLoc);
                const now = new Date().toISOString();

                // 1. 移動元の在庫を減らす
                if (fromItem) {
                    const newFromStock = Math.max(0, Number(fromItem.stock) - amount);
                    await handleUpdate('inventory', fromItem.id, { prevStock: fromItem.stock, prevChecked: fromItem.lastChecked || fromItem.createdAt?.toDate().toISOString() || now, stock: newFromStock, lastChecked: now });
                    await methods.addDoc(methods.collection(db, 'artifacts', appId, 'public', 'data', 'inventory_logs'), { itemId: fromItem.id, itemName, location: fromLoc, change: -amount, stockAfter: newFromStock, timestamp: methods.serverTimestamp(), userId: user.uid });
                }

                // 2. 移動先の在庫を増やす
                if (toItem) {
                    const newToStock = Number(toItem.stock) + amount;
                    await handleUpdate('inventory', toItem.id, { prevStock: toItem.stock, prevChecked: toItem.lastChecked || toItem.createdAt?.toDate().toISOString() || now, stock: newToStock, lastChecked: now });
                    await methods.addDoc(methods.collection(db, 'artifacts', appId, 'public', 'data', 'inventory_logs'), { itemId: toItem.id, itemName, location: toLoc, change: amount, stockAfter: newToStock, timestamp: methods.serverTimestamp(), userId: user.uid });
                } else {
                    const newItemRef = await methods.addDoc(methods.collection(db, 'artifacts', appId, 'public', 'data', 'inventory'), { name: itemName, location: toLoc, stock: amount, threshold: fromItem ? fromItem.threshold : 5, createdAt: methods.serverTimestamp(), updatedAt: methods.serverTimestamp(), lastChecked: now, userId: user.uid });
                    await methods.addDoc(methods.collection(db, 'artifacts', appId, 'public', 'data', 'inventory_logs'), { itemId: newItemRef.id, itemName, location: toLoc, change: amount, stockAfter: amount, timestamp: methods.serverTimestamp(), userId: user.uid });
                }

                setToastMessage(`「${itemName}」を ${fromLoc} から ${toLoc} へ ${amount}個 移動しました！`);
                setTimeout(() => setToastMessage(null), 3000);
            };

            const handleSaveShiftBulk = async (date, newShifts) => {
                if (!user) return;
                const existing = shifts.filter(s => s.date === date);
                for (const s of existing) await methods.deleteDoc(methods.doc(db, 'artifacts', appId, 'public', 'data', 'shifts', s.id));
                for (const s of newShifts) await methods.addDoc(methods.collection(db, 'artifacts', appId, 'public', 'data', 'shifts'), { ...s, createdAt: methods.serverTimestamp(), userId: user.uid });
            };

            const handleAddMaintUpdate = async (data) => {
                if (!showAddUpdate || !user) return;
                const record = showAddUpdate;
                const newUpdate = { comment: data.comment, images: data.images || [], updatedAt: new Date().toISOString(), userId: user.uid };
                await handleUpdate('maintenance_records', record.id, { updates: methods.arrayUnion(newUpdate) });
            };

            const generateFormattedMaintReport = (selectedRecords) => {
                let text = "【メンテ報告まとめ】\n━━━━━━━━━━━━\n";
                selectedRecords.forEach((r, idx) => {
                    text += `■ ${r.date} (${r.facility})\n`;
                    const hasImages = (r.images && r.images.length > 0) || (r.updates && r.updates.some(u => u.images && u.images.length > 0));
                    if (hasImages) text += "【写真】\n";
                    text += `${r.task}\n`;
                    if (r.updates && r.updates.length > 0) {
                        r.updates.forEach(u => { text += ` └追記: ${u.comment}\n`; });
                    }
                    if (idx < selectedRecords.length - 1) text += "--------------------\n";
                });
                text += "\n詳細はこちら→ https://ion0002.pages.dev/";
                return text;
            };

            const handleGenerateLineReport = () => {
                const selected = records.filter(r => selectedMaintIds.has(r.id));
                if (selected.length === 0) return;
                const text = generateFormattedMaintReport(selected);
                copyToClipboard(text, "LINE報告文をコピーしました！");
                setIsSelectionMode(false);
                setSelectedMaintIds(new Set());
            };

            const handleBulkCopyByDate = async (data) => {
                const dateStr = data.date;
                const filtered = records.filter(r => r.date === dateStr);
                if (filtered.length === 0) {
                    setToastMessage("該当日の報告はありませんでした");
                    setTimeout(() => setToastMessage(null), 3000);
                    return;
                }
                const text = generateFormattedMaintReport(filtered);
                copyToClipboard(text, `${dateStr} の報告 ${filtered.length}件 をコピーしました！`);
                setShowBulkCopyModal(false);
            };

            const dayDetailBookings = useMemo(() => {
                if (!selectedDayStr) return [];
                return bookings.filter(b => selectedDayStr >= b.startDate && selectedDayStr <= b.endDate);
            }, [selectedDayStr, bookings]);

            // Gallery logic
            const nextImage = (e) => {
                e.stopPropagation();
                setImageGallery(prev => ({ ...prev, index: (prev.index + 1) % prev.images.length }));
            };
            const prevImage = (e) => {
                e.stopPropagation();
                setImageGallery(prev => ({ ...prev, index: (prev.index - 1 + prev.images.length) % prev.images.length }));
            };

            return (
                <div className="min-h-screen pb-24 overflow-x-hidden bg-slate-50 font-black text-left text-slate-900">
                    <header className="sticky top-0 z-30 bg-white/80 backdrop-blur-md border-b border-slate-200 px-4 py-3 flex justify-between items-center shadow-sm text-left">
                        <div className="flex items-center gap-2">
                            {!logoError ? (
                                <img 
                                    src="./logo.png" 
                                    alt="Portal Logo" 
                                    className="h-8 w-auto object-contain"
                                    onError={() => setLogoError(true)}
                                />
                            ) : (
                                <h1 className="text-xl font-black text-indigo-700 flex items-center gap-2 tracking-tighter text-left">
                                    <Icon name="RefreshCw" size={20} />
                                    <span>Portal</span>
                                </h1>
                            )}
                        </div>
                        <select value={selectedFacility} onChange={e => setSelectedFacility(e.target.value)} className="bg-slate-100 border-none rounded-full px-4 py-1.5 text-[11px] font-black outline-none text-left">
                            <option value="all">全施設表示</option>
                            {FACILITIES.map(f => <option key={f} value={f}>{f}</option>)}
                        </select>
                    </header>

                    <main className={`p-4 mx-auto space-y-6 text-left transition-all duration-500 ${activeTab === 'schedule' ? 'max-w-6xl' : 'max-w-md'}`}>
                        {(!user) ? (<div className="flex flex-col items-center justify-center py-40 text-slate-400 gap-4 text-left"><Icon name="RefreshCw" className="animate-spin" size={32} /><p>認証中...</p></div>) : (
                            <>
                                {activeTab === 'schedule' && <ScheduleSectionContainer selectedFacility={selectedFacility} bookings={bookings} records={records} manuals={manuals} shifts={shifts} onOpenAdd={() => setShowAddBooking(true)} onOpenDetail={setSelectedDayStr} onLinkeyCheck={handleLinkeyCheck} onUpdateBooking={handleUpdateBooking} onLineReport={() => setShowLineReportSelector(true)} />}
                                {activeTab === 'shift' && <ShiftSection shifts={shifts} onOpenAdd={() => { setSelectedShiftDate(null); setShowShiftBulk(true); }} onDelete={id => handleDelete('shifts', id)} onEdit={(date) => { setSelectedShiftDate(date); setShowShiftBulk(true); }} />}
                                {activeTab === 'maintenance' && (
                                    <div className="space-y-6 text-left">
                                        <div className="flex flex-col gap-3 px-1">
                                            <div className="flex flex-wrap items-center gap-2">
                                                {isSelectionMode ? (
                                                    <>
                                                        <button onClick={() => { setIsSelectionMode(false); setSelectedMaintIds(new Set()); }} className="bg-slate-200 text-slate-600 text-[10px] px-3 py-2 rounded-full flex items-center gap-1 font-black shadow-sm transition-all"><Icon name="X" size={12} />取消</button>
                                                        <button onClick={handleGenerateLineReport} disabled={selectedMaintIds.size === 0} className="bg-emerald-500 text-white text-[10px] px-4 py-2 rounded-full flex items-center gap-1 font-black shadow-lg shadow-emerald-200 active:scale-95 disabled:bg-slate-300 disabled:shadow-none transition-all flex-1 text-center justify-center"><Icon name="Copy" size={12} />コピー ({selectedMaintIds.size})</button>
                                                    </>
                                                ) : (
                                                    <>
                                                        <button onClick={() => setIsSelectionMode(true)} className="bg-emerald-500 text-white text-[10px] px-3 py-2.5 rounded-full flex items-center gap-1 font-black shadow-sm active:scale-95 transition-all whitespace-nowrap"><Icon name="MessageCircle" size={12} />選択コピー</button>
                                                        <button onClick={() => setShowBulkCopyModal(true)} className="bg-sky-500 text-white text-[10px] px-3 py-2.5 rounded-full flex items-center gap-1 font-black shadow-sm active:scale-95 transition-all whitespace-nowrap"><Icon name="Calendar" size={12} />日付指定コピー</button>
                                                        <button onClick={() => setShowAddMaintenance(true)} className="bg-indigo-600 text-white text-[10px] px-4 py-2.5 rounded-full shadow-md flex items-center gap-1 font-black active:scale-95 transition-all flex-1 justify-center whitespace-nowrap"><Icon name="Plus" size={12} />報告</button>
                                                    </>
                                                )}
                                            </div>
                                            <div className="space-y-2">
                                                <div className="relative text-left">
                                                    <Icon name="Search" size={16} className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" />
                                                    <input type="text" placeholder="キーワードで内容を検索..." className="w-full pl-10 pr-4 py-2.5 bg-white border border-slate-200 rounded-xl text-sm font-black shadow-sm outline-none text-left" value={maintenanceSearch} onChange={e => setMaintenanceSearch(e.target.value)} />
                                                </div>
                                                <div className="flex items-center gap-3 px-2 py-2 bg-slate-100/50 rounded-2xl border border-slate-200/50">
                                                    <div className="flex items-center gap-1.5 shrink-0">
                                                        <Icon name="History" size={12} className="text-indigo-500" />
                                                        <span className="text-[10px] text-slate-500 font-black">日付で探す:</span>
                                                    </div>
                                                    <input type="date" value={maintenanceDateFilter} onChange={e => setMaintenanceDateFilter(e.target.value)} className="bg-transparent text-[11px] font-black outline-none flex-1 text-slate-700" />
                                                    {maintenanceDateFilter && (<button onClick={() => setMaintenanceDateFilter('')} className="bg-slate-200 p-1 rounded-full text-slate-500"><Icon name="X" size={10} strokeWidth={3} /></button>)}
                                                </div>
                                            </div>
                                        </div>
                                        <MaintenanceCardList records={records} selectedFacility={selectedFacility} maintenanceSearch={maintenanceSearch} maintenanceDateFilter={maintenanceDateFilter} showArchive={showArchive} selectionMode={isSelectionMode} selectedMaintIds={selectedMaintIds} onToggleSelection={(id) => { const n = new Set(selectedMaintIds); if(n.has(id)) n.delete(id); else n.add(id); setSelectedMaintIds(n); }} onEdit={setEditingMaintenanceRecord} onAddUpdate={setShowAddUpdate} onDelete={id => handleDelete('maintenance_records', id)} onImageClick={(imgs, idx) => setImageGallery({images: imgs, index: idx})} />
                                        {(!isSelectionMode && !maintenanceDateFilter) && <button onClick={() => setShowArchive(!showArchive)} className="w-full py-4 bg-white border border-slate-200 rounded-2xl text-slate-500 font-black shadow-sm text-left">{showArchive ? "直近の報告のみ表示" : "すべての履歴を見る"}</button>}
                                    </div>
                                )}
                                {activeTab === 'inventory' && <InventorySection items={inventoryItems} onOpenAdd={() => setShowAddInventory(true)} onEdit={setEditingInventoryItem} onDelete={id => handleDelete('inventory', id)} onUpdateStock={handleUpdateStock} onShowHistory={setShowInventoryHistory} onOpenTransfer={setTransferGroup} autoMode={inventoryAutoMode} setAutoMode={setInventoryAutoMode} />}
                                {activeTab === 'manual' && <ManualSectionWrapperContainer manuals={manuals} selectedFacility={selectedFacility} onOpenAdd={(type) => { setManualTypeForAdd(type); setShowAddManual(true); }} onCopy={txt => copyToClipboard(txt, "本文をコピーしました")} onDelete={id => handleDelete('manuals', id)} onEdit={setEditingManual} onImageClick={(imgs, idx) => setImageGallery({images: imgs, index: idx})} appId={appId} />}
                            </>
                        )}
                    </main>

                    {/* ★自動連動時に表示されるコンパクトなPOP通知（スマホでも見切れない） */}
                    {syncNotification && (
                        <div className="fixed top-1/4 left-1/2 -translate-x-1/2 w-11/12 max-w-sm z-[4000]">
                            <div className="bg-slate-800 text-white p-4 rounded-2xl shadow-2xl animate-in slide-in-from-top-4 flex items-start gap-3 border border-slate-700">
                                <div className="w-8 h-8 bg-indigo-500/20 text-indigo-400 rounded-full flex items-center justify-center shrink-0 mt-1">
                                    <Icon name="Repeat" size={16} strokeWidth={3} />
                                </div>
                                <div className="flex-1 min-w-0">
                                    <h3 className="text-sm font-black text-white mb-1">自動連動しました</h3>
                                    <p className="text-[11px] font-bold text-slate-300 leading-relaxed">
                                        <span className="text-white">{syncNotification.targetLocation}</span>に補充されたため、<br/>
                                        <span className="text-rose-400">{syncNotification.sourceLocation}</span>の「{syncNotification.itemName}」を<br/>
                                        自動で <span className="text-rose-400 text-sm font-black">{syncNotification.amount}個</span> 減らしました。
                                    </p>
                                </div>
                                <button onClick={() => setSyncNotification(null)} className="text-slate-400 hover:text-white p-1 shrink-0 bg-slate-700/50 rounded-full">
                                    <Icon name="X" size={14} />
                                </button>
                            </div>
                        </div>
                    )}

                    {toastMessage && <div className="fixed top-20 left-1/2 -translate-x-1/2 w-[90%] max-w-sm z-[3000] bg-slate-800 text-white px-4 py-3 rounded-2xl shadow-2xl text-xs font-black animate-in fade-in tracking-tight text-center leading-relaxed">{toastMessage}</div>}
                    
                    <nav className="fixed bottom-0 left-0 right-0 bg-white border-t px-2 py-3 flex justify-around items-center z-40 shadow-lg font-black"><NavItem active={activeTab === 'schedule'} iconName="Bed" label="宿泊" onClick={() => setActiveTab('schedule')} /><NavItem active={activeTab === 'shift'} iconName="Calendar" label="シフト" onClick={() => setActiveTab('shift')} /><NavItem active={activeTab === 'maintenance'} iconName="Wrench" label="メンテ" onClick={() => setActiveTab('maintenance')} /><NavItem active={activeTab === 'inventory'} iconName="Package" label="備品" onClick={() => setActiveTab('inventory')} /><NavItem active={activeTab === 'manual'} iconName="BookOpen" label="マニュアル" onClick={() => setActiveTab('manual')} /></nav>

                    {/* Image Viewer (Gallery) */}
                    {imageGallery && (
                        <div className="fixed inset-0 bg-black/95 z-[5000] flex items-center justify-center p-4" onClick={() => setImageGallery(null)}>
                            <button className="absolute top-6 right-6 text-white z-50"><Icon name="X" size={32} /></button>
                            
                            {imageGallery.images.length > 1 && (
                                <>
                                    <button onClick={prevImage} className="absolute left-4 text-white/50 hover:text-white p-2 z-50"><Icon name="ChevronLeft" size={48} /></button>
                                    <button onClick={nextImage} className="absolute right-4 text-white/50 hover:text-white p-2 z-50"><Icon name="ChevronRight" size={48} /></button>
                                    <div className="absolute bottom-10 left-1/2 -translate-x-1/2 text-white/70 font-black text-sm">
                                        {imageGallery.index + 1} / {imageGallery.images.length}
                                    </div>
                                </>
                            )}
                            
                            <img 
                                src={imageGallery.images[imageGallery.index]} 
                                className="max-w-full max-h-[80vh] object-contain rounded-lg shadow-2xl animate-in zoom-in-95 duration-200"
                                onClick={(e) => { e.stopPropagation(); setImageGallery(null); }}
                            />
                        </div>
                    )}

                    {/* Modals */}
                    {showLineReportSelector && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[2000] flex items-end sm:items-center justify-center p-4 font-black text-left">
                            <div className="bg-white w-full max-sm:max-h-[90vh] max-w-sm rounded-[2.5rem] p-6 shadow-2xl overflow-y-auto animate-in slide-in-from-bottom-5">
                                <div className="flex justify-between items-center mb-6 text-left"><h3 className="text-lg font-black text-slate-800 italic">報告する施設を選択</h3><button onClick={() => { setShowLineReportSelector(false); setSelectedReportBookingIds(new Set()); }} className="p-2 text-slate-400 font-black">✕</button></div>
                                <div className="space-y-3 mb-8 max-h-[50vh] overflow-y-auto no-scrollbar text-left">
                                    {bookings.filter(b => { const todayStr = new Date().toLocaleDateString('sv-SE'); return todayStr >= b.startDate && todayStr <= b.endDate; }).map(b => {
                                        const todayStr = new Date().toLocaleDateString('sv-SE'); const isOUT = b.endDate === todayStr; const isIN = b.startDate === todayStr; const isSTAY = todayStr > b.startDate && todayStr < b.endDate; const statusStr = isOUT ? "OUT" : isIN ? "IN" : isSTAY ? "STAY" : "";
                                        return (
                                            <button key={b.id} onClick={() => toggleReportSelection(b.id)} className={`w-full p-4 border rounded-2xl flex items-center justify-between transition-all ${selectedReportBookingIds.has(b.id) ? 'bg-indigo-50 border-indigo-600 shadow-md ring-2 ring-indigo-600/10' : 'bg-slate-50 border-slate-100 opacity-60'}`}>
                                                <div className="flex items-center gap-3 text-left">
                                                    <span className="w-3 h-3 rounded-full" style={{backgroundColor: FACILITY_COLORS[b.facility]}}></span>
                                                    <div className="text-left"><div className="text-xs font-black text-slate-400">{b.facility} ({statusStr})</div><div className="text-sm font-black text-slate-700">{b.guestName}様</div></div>
                                                </div>
                                                <div className={`w-6 h-6 rounded-full flex items-center justify-center border-2 ${selectedReportBookingIds.has(b.id) ? 'bg-indigo-600 border-indigo-600 text-white' : 'bg-white border-slate-200'}`}>{selectedReportBookingIds.has(b.id) && <Icon name="Check" size={12} strokeWidth={4} />}</div>
                                            </button>
                                        );
                                    })}
                                </div>
                                <button disabled={selectedReportBookingIds.size === 0} onClick={handleBulkLineReport} className="w-full bg-emerald-500 text-white py-4 rounded-[1.5rem] shadow-xl flex items-center justify-center gap-3 font-black active:scale-95 transition-all disabled:bg-slate-200 disabled:shadow-none text-left"><Icon name="MessageCircle" size={20} strokeWidth={3} />選んだ施設を報告する ({selectedReportBookingIds.size})</button>
                            </div>
                        </div>
                    )}

                    {selectedDayStr && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[1000] flex items-center justify-center p-4 font-black text-slate-800 text-left">
                            <div className="bg-white w-full max-w-md rounded-[2.5rem] p-6 shadow-2xl animate-in zoom-in-95 text-left"><div className="flex justify-between items-center mb-6 text-left"><h3 className="text-xl font-black">{selectedDayStr.replace(/-/g, '/')} の詳細</h3><button onClick={() => setSelectedDayStr(null)} className="p-2 text-slate-400 bg-slate-100 rounded-full font-black">✕</button></div>
                                <div className="space-y-4 max-h-[60vh] overflow-y-auto no-scrollbar font-black text-left">
                                    {dayDetailBookings.map((b, i) => {
                                        const isIN = b.startDate === selectedDayStr; const isOUT = b.endDate === selectedDayStr; const isS = selectedDayStr >= b.startDate && selectedDayStr < b.endDate && !isIN;
                                        return (
                                            <div key={`${b.id}-${i}`} className="bg-slate-50 p-3 sm:p-4 rounded-3xl border border-slate-100 relative font-black text-slate-900 text-left">
                                                <div className="flex items-center justify-between mb-2 text-left">
                                                    <div className="flex items-center gap-2 text-left"><span className="w-3 h-3 rounded-full" style={{backgroundColor: FACILITY_COLORS[b.facility] || '#cbd5e1'}}></span><span className="text-[10px] text-slate-400 uppercase font-black">{b?.facility || '施設不明'} · {b?.people || 0}名</span></div>
                                                    <span className={`${isIN ? "bg-emerald-500" : isOUT ? "bg-rose-500" : "bg-indigo-500"} text-white text-[9px] px-2 py-0.5 rounded-full font-black shadow-sm`}>{isIN ? "IN" : isOUT ? "OUT" : isS ? "IN中" : "予約"}</span>
                                                </div>
                                                <div className="text-slate-800 text-lg font-black pr-16 text-left">{b?.guestName || '名称未設定'} 様</div>
                                                <div className="text-[10px] text-indigo-400 font-bold mt-1 bg-white inline-block px-2 py-0.5 rounded border border-indigo-50 text-left">{formatMMDD(b?.startDate)} - {formatMMDD(b?.endDate)}</div>
                                                <BookingOptions booking={b} /><CheckInCounter booking={b} onUpdate={handleUpdateBooking} />
                                                <div className="absolute bottom-4 right-4 flex gap-3 text-left">
                                                    <button onClick={() => { setEditingBooking(b); setSelectedDayStr(null); }} className="text-slate-300 hover:text-indigo-500 transition-colors"><Icon name="Edit3" size={16} /></button>
                                                    <button onClick={() => { if(b?.id) handleDelete('bookings', b.id); setSelectedDayStr(null); }} className="text-slate-300 hover:text-rose-500 transition-colors"><Icon name="Trash2" size={16} /></button>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                                <button onClick={() => setSelectedDayStr(null)} className="mt-6 w-full py-4 bg-slate-800 text-white font-black rounded-2xl active:scale-95 transition-all text-left">閉じる</button>
                            </div>
                        </div>
                    )}

                    {showBulkCopyModal && <AddModal title="日付指定一括コピー" onClose={() => setShowBulkCopyModal(false)} onSave={handleBulkCopyByDate} fields={[{ name: 'date', label: '一括抽出する日付', type: 'date', default: new Date().toLocaleDateString('sv-SE') }]} />}
                    {showAddBooking && <AddModal title="予約登録" onClose={() => setShowAddBooking(false)} onSave={d => handleSave('bookings', d)} fields={[{ name: 'facility', label: '施設', type: 'select', options: FACILITIES }, { name: 'guestName', label: 'ゲスト名', type: 'text' }, { name: 'people', label: '人数', type: 'number', default: 1 }, { name: 'startDate', label: 'IN日', type: 'date' }, { name: 'endDate', label: 'OUT日', type: 'date' }, { name: 'babyCrib', label: 'ベビーベッド', type: 'checkbox' }, { name: 'babyBath', label: 'ベビーバス', type: 'checkbox' }, { name: 'babyChair', label: 'ベビーチェア', type: 'checkbox' }, { name: 'luggage', label: '荷物預かり', type: 'checkbox' }, { name: 'notes', label: '備考', type: 'textarea', required: false }]} />}
                    {editingBooking && <AddModal title="予約編集" initialData={editingBooking} onClose={() => setEditingBooking(null)} onSave={d => handleUpdate('bookings', editingBooking.id, d)} fields={[{ name: 'facility', label: '施設', type: 'select', options: FACILITIES }, { name: 'guestName', label: 'ゲスト名', type: 'text' }, { name: 'people', label: '人数', type: 'number' }, { name: 'startDate', label: 'IN日', type: 'date' }, { name: 'endDate', label: 'OUT日', type: 'date' }, { name: 'babyCrib', label: 'ベビーベッド', type: 'checkbox' }, { name: 'babyBath', label: 'ベビーバス', type: 'checkbox' }, { name: 'babyChair', label: 'ベビーチェア', type: 'checkbox' }, { name: 'luggage', label: '荷物預かり', type: 'checkbox' }, { name: 'notes', label: '備考', type: 'textarea', required: false }]} />}
                    {showShiftBulk && <ShiftBulkModal date={selectedShiftDate || new Date().toLocaleDateString('sv-SE')} existingShifts={shifts.filter(s => s.date === (selectedShiftDate || new Date().toLocaleDateString('sv-SE')))} onClose={() => setShowShiftBulk(false)} onSave={handleSaveShiftBulk} />}
                    {showAddMaintenance && <AddModal title="メンテナンス報告" onClose={() => setShowAddMaintenance(false)} onSave={d => handleSave('maintenance_records', d)} hasImage fields={[{ name: 'facility', label: '施設', type: 'select', options: FACILITIES }, { name: 'staff', label: '担当者名', type: 'select', options: ['江藤', '谷口', '直接入力'] }, { name: 'task', label: '内容', type: 'textarea' }, { name: 'date', label: '日付', type: 'date', default: new Date().toLocaleDateString('sv-SE') }]} />}
                    {editingMaintenanceRecord && <AddModal title="メイン投稿の編集" initialData={editingMaintenanceRecord} onClose={() => setEditingMaintenanceRecord(null)} onSave={d => handleUpdate('maintenance_records', editingMaintenanceRecord.id, d)} hasImage fields={[{ name: 'facility', label: '施設', type: 'select', options: FACILITIES }, { name: 'staff', label: '担当者名', type: 'select', options: ['江藤', '谷口', '直接入力'] }, { name: 'task', label: '内容', type: 'textarea' }, { name: 'date', label: '日付', type: 'date' }]} />}
                    {showAddUpdate && <AddModal title="追加の情報を追記" onClose={() => setShowAddUpdate(null)} onSave={handleAddMaintUpdate} hasImage fields={[{ name: 'comment', label: '追記コメント', type: 'textarea' }]} />}
                    {showAddInventory && <AddModal title="備品登録" onClose={() => setShowAddInventory(false)} onSave={d => handleSave('inventory', { ...d, lastChecked: new Date().toISOString() })} hasImage fields={[{ name: 'location', label: '拠点', type: 'select', options: INVENTORY_LOCATIONS }, { name: 'name', label: '品名', type: 'text' }, { name: 'stock', label: '個数', type: 'number', default: 0 }, { name: 'threshold', label: '補充アラート', type: 'number', default: 5 }]} />}
                    {editingInventoryItem && <AddModal title="備品編集" initialData={editingInventoryItem} onClose={() => setEditingInventoryItem(null)} onSave={d => handleUpdate('inventory', editingInventoryItem.id, d)} hasImage fields={[{ name: 'location', label: '拠点', type: 'select', options: INVENTORY_LOCATIONS }, { name: 'name', label: '品名', type: 'text' }, { name: 'stock', label: '個数', type: 'number' }, { name: 'threshold', label: '補充アラート', type: 'number' }]} />}
                    {showInventoryHistory && <StockHistoryModal item={showInventoryHistory} logs={inventoryLogs.filter(l => l.itemId === showInventoryHistory.id)} onClose={() => setShowInventoryHistory(null)} />}
                    
                    {/* 転送用モーダル */}
                    {transferGroup && <TransferModal group={transferGroup} locations={INVENTORY_LOCATIONS} onClose={() => setTransferGroup(null)} onTransfer={handleTransferStock} />}

                    {showAddManual && <AddModal title={manualTypeForAdd === 'trouble' ? "トラブル履歴を記録" : "マニュアル・FAQ投稿"} onClose={() => setShowAddManual(false)} onSave={d => handleSave('manuals', { ...d, type: manualTypeForAdd })} hasImage fields={manualTypeForAdd === 'trouble' ? [{ name: 'facility', label: '拠点', type: 'select', options: MANUAL_FACILITIES }, { name: 'date', label: '日時', type: 'datetime-local', default: new Date().toISOString().slice(0,16) }, { name: 'title', label: 'トラブル概要', type: 'text' }, { name: 'content', label: '内容詳細', type: 'textarea' }, { name: 'solution', label: '対処法', type: 'textarea' }] : [{ name: 'type', label: '種類', type: 'select', options: ['manual', 'faq'] }, { name: 'facility', label: '拠点', type: 'select', options: MANUAL_FACILITIES }, { name: 'tag', label: 'カテゴリー', type: 'select', options: MANUAL_TAGS }, { name: 'title', label: 'タイトル', type: 'text' }, { name: 'content', label: '内容', type: 'textarea' }]} />}
                    {editingManual && <AddModal title="内容を修正" initialData={editingManual} onClose={() => setEditingManual(null)} onSave={d => handleUpdate('manuals', editingManual.id, d)} hasImage fields={editingManual.type === 'trouble' ? [{ name: 'facility', label: '拠点', type: 'select', options: MANUAL_FACILITIES }, { name: 'date', label: '日時', type: 'datetime-local' }, { name: 'title', label: 'トラブル概要', type: 'text' }, { name: 'content', label: '内容詳細', type: 'textarea' }, { name: 'solution', label: '対処法', type: 'textarea' }] : [{ name: 'facility', label: '拠点', type: 'select', options: MANUAL_FACILITIES }, { name: 'tag', label: 'カテゴリー', type: 'select', options: MANUAL_TAGS }, { name: 'title', label: 'タイトル', type: 'text' }, { name: 'content', label: '内容', type: 'textarea' }]} />}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
